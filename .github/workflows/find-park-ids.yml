name: Find Park IDs

# A helper you run by hand to discover the ID numbers camply needs.

on:
  workflow_dispatch:
    inputs:
      rec_area:
        description: "BC Parks area ID (blank = list areas; 12 = find park IDs)"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

 - name: Install camply (latest source, includes BC Parks fix)
     run: pip install "git+https://github.com/juftin/camply.git"

    
      - name: List areas or find park IDs
        run: |
          if [ -z "${{ github.event.inputs.rec_area }}" ]; then
            echo "=============== BC PARKS RECREATION AREAS ==============="
            camply recreation-areas --provider goingtocamp
          else
            AREA="${{ github.event.inputs.rec_area }}"
            for park in "Golden Ears" "Cultus Lake" "Porteau Cove" "Alice Lake" "Brandywine Falls" "Nairn Falls"; do
              echo "================ $park ================"
              camply campgrounds --provider goingtocamp --rec-area "$AREA" --search "$park" \
                || echo "(no match or error for $park — skipping)"
              echo
            done
          fi
