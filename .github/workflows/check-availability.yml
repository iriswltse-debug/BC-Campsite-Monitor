name: Check BC Parks Availability

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bc-campsite-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      REC_AREA: "12"
      START_DATE: "2026-06-29"
      END_DATE: "2026-09-15"
      CAMPGROUNDS: "-2147483606 -2147483623 -2147483550 -2147483647 -2147483564"

      EMAIL_TO_ADDRESS: ${{ secrets.EMAIL_TO_ADDRESS }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_SUBJECT_LINE: "BC Parks campsite available!"
      TZ: "America/Vancouver"

    steps:
      - name: Get the project files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install camply
        continue-on-error: true
        run: pip install "git+https://github.com/juftin/camply.git@refs/pull/378/head"

      - name: Search for available campsites
        continue-on-error: true
        run: |
          CG_ARGS=""
          for cg in $CAMPGROUNDS; do
            CG_ARGS="$CG_ARGS --campground $cg"
          done
          camply campsites \
            --provider goingtocamp \
            --rec-area "$REC_AREA" \
            $CG_ARGS \
            --start-date "$START_DATE" \
            --end-date "$END_DATE" \
            --notifications email \
            --search-once \
            --offline-search \
            --offline-search-path camply_state.json

      - name: Remember which sites were already reported
        if: always()
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain camply_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add camply_state.json
            git commit -m "Update seen-campsites memory [skip ci]"
            git push
          fi
